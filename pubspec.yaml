name: image_puzzle
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^21.0.0
  google_mobile_ads: ^7.0.0
  image: ^4.8.0
  image_picker: ^1.2.1
  path: ^1.9.1
  sqflite: ^2.4.2
  timezone: ^0.11.0

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 27 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/birds/
    - assets/colors/
    - assets/ocean/
    - assets/animals/
    - assets/balloons/
    - assets/drawer/
    - assets/farm/
    - assets/pets/
    - assets/flower/
    - assets/seasons/
    - assets/statue/
    - assets/urban/
    - assets/landscapes/
    - assets/cars/
